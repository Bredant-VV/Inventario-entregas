<!DOCTYPE html>
<html>
<head>
    <title>Mis entregas</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Mis entregas</h1>
<a href="/login">Administrador</a>

<hr>

<div id="cards" class="cards"></div>

<script>

async function cargar() {
    const res = await fetch("/api/registros");
    const data = await res.json();

    const contenedor = document.getElementById("cards");

    if (data.length === 0) {
        contenedor.innerHTML = "<p>No hay pedidos pendientes.</p>";
        return;
    }

    contenedor.innerHTML = data.map(r => `
        <div class="card">
            <h3>${r.id}</h3>
            <p>${r.accesorio}</p>
            <p>${r.modelo}</p>
            <p>${r.nombre}</p>
        </div>
    `).join("");
}

cargar();

</script>

</body>
</html>
