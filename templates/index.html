<!DOCTYPE html>
<html>
<head>
    <title>Mis entregas</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Mis entregas</h1>
<a href="/login">Administrador</a>

<hr>

<div id="cards" class="cards"></div>

<script>

let ultimaData = "";

// Función para cargar registros activos
async function cargar() {
    try {
        const res = await fetch("/api/registros");
        const data = await res.json();

        const nuevaData = JSON.stringify(data);

        // Solo actualizar si cambió algo (evita parpadeos)
        if (nuevaData !== ultimaData) {
            ultimaData = nuevaData;

            const contenedor = document.getElementById("cards");

            if (data.length === 0) {
                contenedor.innerHTML = "<p>No hay pedidos pendientes.</p>";
                return;
            }

            contenedor.innerHTML = data.map(r => `
                <div class="card">
                    <h3>${r.id}</h3>
                    <p><strong>Accesorio:</strong> ${r.accesorio}</p>
                    <p><strong>Modelo:</strong> ${r.modelo}</p>
                    <p><strong>Nombre:</strong> ${r.nombre}</p>
                </div>
            `).join("");
        }

    } catch (error) {
        console.error("Error cargando registros:", error);
    }
}

// Cargar al iniciar
cargar();


setInterval(cargar, 10000);

</script>

</body>
</html>
