<!DOCTYPE html>
<html>
<head>
    <title>Administrador</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Administrador</h1>
<a href="/logout">Cerrar sesión</a>

<div class="search">
    <input type="text" id="buscar" placeholder="Buscar por POO o Factura...">
    <button onclick="buscarDoc()">Buscar</button>
    <button onclick="cargar()">Mostrar activos</button>
</div>

<hr>

<div class="form">
    <input id="id" placeholder="ID">
    <select id="accesorio"></select>
    <select id="modelo"></select>
    <input id="nombre" placeholder="Nombre">
    <input id="poo" placeholder="POO">
    <input id="factura" placeholder="Factura">
    <button onclick="agregar()">Agregar</button>
</div>

<div class="catalogo">
    <input id="nuevoAcc" placeholder="Nuevo accesorio">
    <button onclick="agregarAcc()">Agregar accesorio</button>

    <input id="nuevoMod" placeholder="Nuevo modelo">
    <button onclick="agregarMod()">Agregar modelo</button>
</div>

<hr>

<div id="cards" class="cards"></div>

<script>
async function cargarCatalogo(){
    const res = await fetch("/api/catalogo");
    const data = await res.json();

    accesorio.innerHTML = data.accesorios.map(a=>`<option>${a}</option>`).join("");
    modelo.innerHTML = data.modelos.map(m=>`<option>${m}</option>`).join("");
}

async function cargar(){
    const res = await fetch("/api/registros");
    const data = await res.json();

    cards.innerHTML = data.map(r=>`
        <div class="card">
            <b>${r.id}</b>
            <div>${r.accesorio}</div>
            <div>${r.modelo}</div>
            <div>${r.nombre}</div>
            <button onclick="entregar('${r.id}')">Entregado</button>
            <button onclick="eliminarR('${r.id}')">Eliminar</button>
        </div>
    `).join("");
}

async function agregar(){
    await fetch("/api/agregar",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            id:id.value,
            accesorio:accesorio.value,
            modelo:modelo.value,
            nombre:nombre.value,
            poo:poo.value,
            factura:factura.value
        })
    });
    cargar();
}

async function entregar(id){
    await fetch("/api/entregado/"+id,{method:"PUT"});
    cargar();
}

async function eliminarR(id){
    await fetch("/api/eliminar/"+id,{method:"DELETE"});
    cargar();
}

async function buscarDoc(){
    const valor = buscar.value;
    const res = await fetch("/api/buscar/"+valor);
    const data = await res.json();

    cards.innerHTML = data.map(r=>`
        <div class="card">
            <b>${r.id}</b>
            <div>${r.accesorio}</div>
            <div>${r.modelo}</div>
            <div>${r.nombre}</div>
        </div>
    `).join("");
}

async function agregarAcc(){
    await fetch("/api/catalogo",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({tipo:"accesorio",valor:nuevoAcc.value})
    });
    cargarCatalogo();
}

async function agregarMod(){
    await fetch("/api/catalogo",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({tipo:"modelo",valor:nuevoMod.value})
    });
    cargarCatalogo();
}

cargarCatalogo();
cargar();
</script>

</body>
</html>
